name: Bug Report
description: Report incorrect behavior, regressions, or reliability issues.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. If this is a suspected vulnerability, do not file a public issue. Follow SECURITY.md instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "The limiter allows more requests than expected when..."
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - TokenBucket
        - LeakyBucket
        - RedisLimiter
        - Tests or benchmarks
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include minimal code, commands, Redis setup, or test output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: "go version go1.24.0 linux/amd64"
    validations:
      required: true

  - type: input
    id: redis-version
    attributes:
      label: Redis Version
      description: Required only for RedisLimiter issues.
      placeholder: "redis-server --version"

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which checks did you run?
      value: |
        - [ ] go test ./...
        - [ ] go test -race ./...
        - [ ] go vet ./...
        - [ ] Redis integration tests with localhost:6379
    validations:
      required: true
